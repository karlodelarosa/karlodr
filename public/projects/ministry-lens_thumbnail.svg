<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="ml-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071210"/>
      <stop offset="1" stop-color="#0f1f1c"/>
    </linearGradient>
    <linearGradient id="ml-green" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#46cf98"/>
      <stop offset="1" stop-color="#04b6c1"/>
    </linearGradient>
    <filter id="ml-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#ml-bg)"/>
  <g filter="url(#ml-shadow)">
    <rect x="48" y="32" width="704" height="436" rx="14" fill="#f4f7f6"/>
    <rect x="48" y="32" width="704" height="38" rx="14" fill="#fff"/>
    <rect x="48" y="58" width="704" height="12" fill="#fff"/>
    <circle cx="72" cy="51" r="6" fill="#ff8a80"/>
    <circle cx="92" cy="51" r="6" fill="#ffd54f"/>
    <circle cx="112" cy="51" r="6" fill="#69f0ae"/>
    <text x="72" y="88" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#0f1f1c">Ministry Lens</text>
    <rect x="600" y="76" width="120" height="24" rx="12" fill="#e8f5f0"/>
    <text x="618" y="92" font-family="system-ui,sans-serif" font-size="9" fill="#2d6a4f">● Live</text>
    <!-- sidebar -->
    <rect x="48" y="108" width="140" height="360" fill="#fff"/>
    <rect x="64" y="128" width="108" height="28" rx="6" fill="url(#ml-green)" fill-opacity="0.15"/>
    <rect x="72" y="138" width="72" height="8" rx="2" fill="#2d6a4f"/>
    <rect x="64" y="168" width="108" height="8" rx="2" fill="#ddd"/>
    <rect x="64" y="188" width="88" height="8" rx="2" fill="#ddd"/>
    <rect x="64" y="208" width="96" height="8" rx="2" fill="#ddd"/>
    <rect x="64" y="228" width="80" height="8" rx="2" fill="#ddd"/>
    <!-- stat cards -->
    <rect x="204" y="108" width="168" height="88" rx="10" fill="#fff" stroke="#e0ebe6" stroke-width="1"/>
    <text x="220" y="136" font-family="system-ui,sans-serif" font-size="10" fill="#888">Total Members</text>
    <text x="220" y="172" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#0f1f1c">248</text>
    <rect x="384" y="108" width="168" height="88" rx="10" fill="#fff" stroke="#e0ebe6" stroke-width="1"/>
    <text x="400" y="136" font-family="system-ui,sans-serif" font-size="10" fill="#888">Attendance</text>
    <text x="400" y="172" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#46cf98">92%</text>
    <rect x="564" y="108" width="172" height="88" rx="10" fill="#fff" stroke="#e0ebe6" stroke-width="1"/>
    <text x="580" y="136" font-family="system-ui,sans-serif" font-size="10" fill="#888">Households</text>
    <text x="580" y="172" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#04b6c1">64</text>
    <!-- chart area -->
    <rect x="204" y="212" width="532" height="200" rx="10" fill="#fff" stroke="#e0ebe6" stroke-width="1"/>
    <text x="224" y="240" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#333">Weekly Growth</text>
    <rect x="240" y="320" width="36" height="64" rx="4" fill="#e0ebe6"/>
    <rect x="292" y="296" width="36" height="88" rx="4" fill="#c8e6d8"/>
    <rect x="344" y="272" width="36" height="112" rx="4" fill="#a8dcc4"/>
    <rect x="396" y="256" width="36" height="128" rx="4" fill="url(#ml-green)" fill-opacity="0.7"/>
    <rect x="448" y="280" width="36" height="104" rx="4" fill="#a8dcc4"/>
    <rect x="500" y="264" width="36" height="120" rx="4" fill="#46cf98"/>
    <rect x="552" y="248" width="36" height="136" rx="4" fill="url(#ml-green)"/>
    <rect x="604" y="268" width="36" height="116" rx="4" fill="#04b6c1" fill-opacity="0.6"/>
    <!-- table rows -->
    <rect x="204" y="428" width="532" height="40" rx="8" fill="#fff" stroke="#e0ebe6"/>
    <rect x="220" y="442" width="80" height="6" rx="2" fill="#ccc"/>
    <rect x="360" y="442" width="60" height="6" rx="2" fill="#ccc"/>
    <rect x="500" y="442" width="40" height="6" rx="2" fill="#46cf98"/>
  </g>
</svg>
