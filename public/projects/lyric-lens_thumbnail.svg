<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="ll-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0e14"/>
      <stop offset="1" stop-color="#161b28"/>
    </linearGradient>
    <linearGradient id="ll-accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6c5ce7"/>
      <stop offset="1" stop-color="#a29bfe"/>
    </linearGradient>
    <filter id="ll-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ll-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#ll-bg)"/>
  <ellipse cx="400" cy="120" rx="200" ry="80" fill="#6c5ce7" fill-opacity="0.15" filter="url(#ll-glow)"/>
  <g filter="url(#ll-shadow)">
    <rect x="56" y="40" width="688" height="420" rx="14" fill="#12151f"/>
    <rect x="56" y="40" width="688" height="40" rx="14" fill="#1a1f2e"/>
    <rect x="56" y="68" width="688" height="12" fill="#1a1f2e"/>
    <circle cx="80" cy="60" r="6" fill="#ff6b6b"/>
    <circle cx="100" cy="60" r="6" fill="#ffe566"/>
    <circle cx="120" cy="60" r="6" fill="#4ecdc4"/>
    <text x="340" y="64" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#a29bfe">Lyric Lens</text>
    <!-- sidebar -->
    <rect x="56" y="80" width="160" height="380" fill="#0e1118"/>
    <rect x="72" y="100" width="80" height="8" rx="2" fill="url(#ll-accent)"/>
    <rect x="72" y="124" width="120" height="6" rx="2" fill="#2a3040"/>
    <rect x="72" y="140" width="100" height="6" rx="2" fill="#2a3040"/>
    <rect x="72" y="168" width="128" height="32" rx="6" fill="#1e2433" stroke="#6c5ce7" stroke-width="1"/>
    <rect x="72" y="212" width="128" height="32" rx="6" fill="#161b28"/>
    <rect x="72" y="256" width="128" height="32" rx="6" fill="#161b28"/>
    <!-- main stage -->
    <rect x="216" y="80" width="528" height="380" fill="#0a0c12"/>
    <text x="248" y="140" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#f4f4f8">Amazing Grace</text>
    <text x="248" y="180" font-family="Georgia,serif" font-size="18" fill="#8888a0" font-style="italic">How sweet the sound</text>
    <text x="248" y="220" font-family="Georgia,serif" font-size="18" fill="#8888a0" font-style="italic">That saved a wretch like me</text>
    <rect x="248" y="248" width="280" height="3" rx="1" fill="url(#ll-accent)" fill-opacity="0.6"/>
    <text x="248" y="280" font-family="Georgia,serif" font-size="18" fill="#555" font-style="italic">I once was lost, but now am found</text>
  <!-- controls bar -->
    <rect x="248" y="400" width="464" height="44" rx="8" fill="#161b28"/>
    <circle cx="280" cy="422" r="12" fill="#2a3040"/>
    <polygon points="276,418 276,426 284,422" fill="#a29bfe"/>
    <rect x="320" y="414" width="120" height="16" rx="4" fill="#2a3040"/>
    <rect x="520" y="410" width="72" height="24" rx="6" fill="url(#ll-accent)"/>
    <text x="536" y="426" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">Present</text>
  </g>
</svg>
