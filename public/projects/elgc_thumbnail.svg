<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="elgc-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a1410"/>
      <stop offset="1" stop-color="#2d241c"/>
    </linearGradient>
    <linearGradient id="elgc-hero" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#c9a227" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1a1410" stop-opacity="0"/>
    </linearGradient>
    <filter id="elgc-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#elgc-bg)"/>
  <rect width="800" height="180" fill="url(#elgc-hero)"/>
  <!-- browser chrome -->
  <g filter="url(#elgc-shadow)">
    <rect x="48" y="36" width="704" height="428" rx="12" fill="#f8f6f1"/>
    <rect x="48" y="36" width="704" height="36" rx="12" fill="#ebe8e0"/>
    <rect x="48" y="60" width="704" height="12" fill="#ebe8e0"/>
    <circle cx="72" cy="54" r="6" fill="#e8a598"/>
    <circle cx="92" cy="54" r="6" fill="#e8d49a"/>
    <circle cx="112" cy="54" r="6" fill="#9fd4a0"/>
    <rect x="200" y="46" width="400" height="16" rx="8" fill="#fff"/>
    <text x="220" y="58" font-family="system-ui,sans-serif" font-size="9" fill="#888">elgchurch.com</text>
    <!-- nav -->
    <rect x="72" y="88" width="48" height="8" rx="2" fill="#c9a227"/>
    <rect x="520" y="86" width="36" height="6" rx="2" fill="#ccc"/>
    <rect x="564" y="86" width="36" height="6" rx="2" fill="#ccc"/>
    <rect x="608" y="86" width="36" height="6" rx="2" fill="#ccc"/>
    <rect x="652" y="84" width="72" height="10" rx="5" fill="#2d5a3d"/>
    <!-- hero -->
    <rect x="72" y="108" width="656" height="120" rx="8" fill="#2d5a3d"/>
    <text x="96" y="148" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#f8f6f1">Emmanuel&apos;s Living Gospel</text>
    <text x="96" y="172" font-family="system-ui,sans-serif" font-size="11" fill="#b8d4be">Experience God&apos;s love in Caloocan City</text>
    <rect x="96" y="188" width="88" height="24" rx="12" fill="#c9a227"/>
    <text x="118" y="204" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#1a1410">New Here?</text>
    <!-- event cards -->
    <rect x="72" y="248" width="200" height="88" rx="8" fill="#fff" stroke="#e5e2da" stroke-width="1"/>
    <rect x="84" y="260" width="64" height="6" rx="2" fill="#c9a227"/>
    <rect x="84" y="276" width="140" height="8" rx="2" fill="#333"/>
    <rect x="84" y="292" width="100" height="6" rx="2" fill="#aaa"/>
    <rect x="84" y="312" width="56" height="14" rx="4" fill="#ebe8e0"/>
    <rect x="288" y="248" width="200" height="88" rx="8" fill="#fff" stroke="#e5e2da" stroke-width="1"/>
    <rect x="300" y="260" width="48" height="6" rx="2" fill="#c9a227"/>
    <rect x="300" y="276" width="120" height="8" rx="2" fill="#333"/>
    <rect x="300" y="292" width="90" height="6" rx="2" fill="#aaa"/>
    <rect x="504" y="248" width="224" height="88" rx="8" fill="#fff" stroke="#e5e2da" stroke-width="1"/>
    <rect x="516" y="260" width="72" height="6" rx="2" fill="#c9a227"/>
    <rect x="516" y="276" width="160" height="8" rx="2" fill="#333"/>
    <!-- gallery strip -->
    <rect x="72" y="356" width="152" height="80" rx="6" fill="#d4cfc4"/>
    <rect x="236" y="356" width="152" height="80" rx="6" fill="#c5bdb0"/>
    <rect x="400" y="356" width="152" height="80" rx="6" fill="#b8afa0"/>
    <rect x="564" y="356" width="164" height="80" rx="6" fill="#a89f90"/>
    <circle cx="148" cy="396" r="16" fill="#fff" fill-opacity="0.3"/>
    <circle cx="312" cy="396" r="16" fill="#fff" fill-opacity="0.3"/>
  </g>
</svg>
